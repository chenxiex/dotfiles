# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix
# End of prefix

# Mouse mode
set -g mouse on

# Non-login shell
set -g default-command "${SHELL}"

# Auto distroy tmp session
set -g destroy-unattached on
set-hook -g session-created 'if-shell "[[ #{session_name} != tmp-* ]]" "set-option destroy-unattached off"'
